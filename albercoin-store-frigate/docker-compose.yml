                "config_notice": "Changes are written to /data/frigate/settings.env. Saving asks for confirmation and restarts Frigate automatically.", "save_configuration": "Save configuration",
                "important": "Important:", "start_height_warning": "changing start height deletes the local db/ index on next Frigate restart so it can be rebuilt correctly from the new height. Empty uses Frigate default.",
