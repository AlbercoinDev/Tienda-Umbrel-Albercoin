                "status_indexing": "Indexando / sincronizando", "detail_indexing": "Frigate está construyendo o actualizando su índice de Silent Payments. Estará listo cuando el log indique Electrum server listening.",
                "default_suffix": "valor por defecto de Frigate", "calculating": "Calculando...",
                "onion_generating": "Generando dirección onion...", "onion_ready": "Usa este host desde clientes Electrum con Tor activado.", "onion_waiting": "Tor todavía está creando el hostname del servicio oculto.",
