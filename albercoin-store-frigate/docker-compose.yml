                "saved_start_height": "Configuración guardada. La altura inicial cambió, así que Frigate borrará db/ y reconstruirá el índice durante el reinicio automático.",
                "saved_restart": "Configuración guardada. Frigate se reiniciará automáticamente para aplicar los cambios.",
                "title_status": "Frigate en Umbrel", "title_config": "Configuración de Frigate",
                "field_START_HEIGHT_label": "Altura inicial", "field_START_HEIGHT_help": "Altura de bloque opcional donde Frigate empieza a construir su índice de Silent Payments. Déjalo vacío para usar el valor oficial por defecto de Frigate: 709632 en mainnet (activación de Taproot), 0 en redes de prueba. Cambiar este valor requiere borrar el índice DuckDB y reconstruirlo desde cero porque Frigate guarda el índice en db/frigate.duckdb y el índice documentado puede reconstruirse desde Bitcoin Core.",
                "field_CACHE_SIZE_label": "Tamaño de caché", "field_CACHE_SIZE_help": "Tamaño de caché scriptPubKey. El valor por defecto 10M usa aproximadamente 4 GB de RAM según la documentación de Frigate. Redúcelo en sistemas con poca memoria.",
                "field_COMPUTE_BACKEND_label": "Backend de cálculo", "field_COMPUTE_BACKEND_help": "AUTO usa GPU si está disponible y CPU en caso contrario. CPU fuerza escaneo por CPU. GPU fuerza escaneo por GPU.",
                "field_DB_THREADS_label": "Hilos de DB", "field_DB_THREADS_help": "Límite opcional de hilos DuckDB. Útil para reducir carga de CPU cuando computeBackend es CPU. Déjalo vacío para usar el valor por defecto de Frigate.",
                "field_MEMORY_LIMIT_label": "Límite de memoria", "field_MEMORY_LIMIT_help": "Límite opcional de memoria DuckDB, por ejemplo 4GB, 8GB, 1024MB. Déjalo vacío para usar el valor por defecto de Frigate.",
                "field_BATCH_SIZE_label": "Tamaño de lote", "field_BATCH_SIZE_help": "Filas opcionales por envío a GPU. Redúcelo si el escaneo se queda colgado o es inestable en GPUs antiguas.",
                "field_MAX_LABELS_label": "Máximo de etiquetas", "field_MAX_LABELS_help": "Máximo de etiquetas Silent Payments aceptadas por suscripción.",
                "field_MAX_SUBSCRIPTIONS_label": "Máximo de suscripciones", "field_MAX_SUBSCRIPTIONS_help": "Máximo de suscripciones Silent Payments por conexión.",
                "field_RPC_REQUEST_TIMEOUT_SECONDS_label": "Timeout RPC", "field_RPC_REQUEST_TIMEOUT_SECONDS_help": "Timeout de lectura por petición RPC contra Bitcoin Core, en segundos. Auméntalo en nodos lentos.",
                "field_RPC_BATCH_SIZE_label": "Tamaño de lote RPC", "field_RPC_BATCH_SIZE_help": "Máximo de sub-peticiones por lote JSON-RPC usado durante la indexación de mempool.",
            },
        }

        def select_language(header):
            for part in (header or "").split(","):
                code = part.split(";", 1)[0].strip().lower()
                if code.startswith("es"):
                    return "es"
                if code.startswith("en"):
                    return "en"
            return "en"

        def tr(lang, key):
            return TEXT.get(lang, TEXT["en"]).get(key, TEXT["en"].get(key, key))

        def ensure_settings():
            DATA_DIR.mkdir(parents=True, exist_ok=True)
            if not SETTINGS_FILE.exists():
                write_settings(DEFAULTS)

        def read_settings():
            ensure_settings()
            values = DEFAULTS.copy()
            for line in SETTINGS_FILE.read_text().splitlines():
                if not line or line.startswith("#") or "=" not in line:
                    continue
                key, value = line.split("=", 1)
                if key in values:
                    values[key] = value.strip()
            return values

        def write_settings(values):
            DATA_DIR.mkdir(parents=True, exist_ok=True)
            lines = []
            for key in DEFAULTS:
                value = str(values.get(key, DEFAULTS[key])).strip()
                value = value.replace("\n", "").replace("\r", "")
                lines.append(f"{key}={value}")
            SETTINGS_FILE.write_text("\n".join(lines) + "\n")

        def log_path(network):
            return DATA_DIR / "frigate.log" if network == "mainnet" else DATA_DIR / network / "frigate.log"

        def latest_lines(path, lang, limit=35):
            if not path.exists():
                return tr(lang, "no_log")
            lines = path.read_text(errors="replace").splitlines()
            return "\n".join(lines[-limit:])

        def status_from_log(path):
            if not path.exists():
                return "status_starting", "detail_starting"
            lines = path.read_text(errors="replace").splitlines()
            recent = "\n".join(lines[-120:])
            if "ERROR" in recent.upper():
                return "status_attention", "detail_attention"
            if any("Electrum server listening" in line for line in lines):
                return "status_ready", "detail_ready"
            return "status_indexing", "detail_indexing"

        def progress_info(path, network, configured_start_height, is_ready, lang):
            default_start = 709632 if network == "mainnet" else 0
            start_height = int(configured_start_height) if configured_start_height.isdigit() else default_start
            start_label = f"{start_height}" if configured_start_height else f"{start_height} ({tr(lang, 'default_suffix')})"
            if is_ready:
                return "100.00%", "100", start_label, tr(lang, "status_ready"), tr(lang, "status_ready")
            if not path.exists():
                return tr(lang, "calculating"), None, start_label, tr(lang, "calculating"), tr(lang, "calculating")
            indexed_height = None
            tip_height = None
            for line in path.read_text(errors="replace").splitlines():
                match = re.search(r"Indexing \d+ blocks \((\d+) to (\d+)\)", line)
                if match:
                    tip_height = int(match.group(2))
                match = re.search(r"Indexing progress: \d+ / \d+ blocks \([\d.]+%, height (\d+)\)", line)
                if match:
                    indexed_height = int(match.group(1))
            if indexed_height is None or tip_height is None or tip_height <= start_height:
                return tr(lang, "calculating"), None, start_label, tr(lang, "calculating"), str(tip_height) if tip_height is not None else tr(lang, "calculating")
            percent = max(0.0, min(100.0, ((indexed_height - start_height) / (tip_height - start_height)) * 100.0))
            return f"{percent:.2f}%", f"{percent:.2f}", start_label, str(indexed_height), str(tip_height)

        def page(title, body, lang, refresh=True):
            refresh_tag = '<meta http-equiv="refresh" content="10">' if refresh else ""
            return f'''<!doctype html>
        <html lang="{escape(lang)}">
        <head>
          <meta charset="utf-8">
          {refresh_tag}
          <meta name="viewport" content="width=device-width, initial-scale=1">
          <title>{escape(title)}</title>
          <style>
            body {{ margin: 0; min-height: 100vh; background: #0b1020; color: #eaf6ff; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; display: grid; place-items: center; padding: 28px 0; }}
            main {{ width: min(980px, calc(100% - 40px)); padding: 42px; border-radius: 28px; background: linear-gradient(145deg, rgba(255,255,255,.12), rgba(255,255,255,.04)); box-shadow: 0 24px 80px rgba(0,0,0,.35); }}
            h1 {{ margin: 0 0 12px; font-size: clamp(34px, 7vw, 64px); line-height: 1; }}
            h2 {{ margin: 0 0 8px; font-size: 16px; color: #ffffff; }}
            p {{ color: #c6d8e8; font-size: 18px; line-height: 1.6; }}
            a, button {{ color: inherit; }}
            nav {{ display: flex; flex-wrap: wrap; gap: 10px; margin: 20px 0 4px; }}
            nav a, button {{ border: 1px solid rgba(92,200,255,.32); background: rgba(92,200,255,.14); color: #9ee3ff; padding: 10px 14px; border-radius: 12px; text-decoration: none; font-weight: 700; cursor: pointer; }}
            code, input, select {{ background: rgba(92,200,255,.14); border: 1px solid rgba(92,200,255,.32); color: #9ee3ff; padding: 8px 10px; border-radius: 8px; }}
            input, select {{ width: 100%; box-sizing: border-box; color: #eaf6ff; }}
            .card {{ margin-top: 22px; padding: 22px; border-radius: 18px; background: rgba(0,0,0,.22); }}
            .status {{ display: inline-flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 999px; background: rgba(92,200,255,.14); border: 1px solid rgba(92,200,255,.32); color: #9ee3ff; font-weight: 700; }}
            .dot {{ width: 10px; height: 10px; border-radius: 999px; background: #5cc8ff; box-shadow: 0 0 18px #5cc8ff; }}
            .connections {{ display: grid; grid-template-columns: 1fr; gap: 16px; margin-top: 22px; }}
            .connection {{ padding: 18px; border-radius: 16px; background: rgba(92,200,255,.08); border: 1px solid rgba(92,200,255,.18); }}
            .endpoint {{ display: block; overflow-wrap: anywhere; font-size: 15px; line-height: 1.45; }}
            .copy-row {{ display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: center; }}
            .copy-button {{ padding: 8px 10px; border-radius: 8px; font-size: 13px; }}
            .progress {{ height: 16px; overflow: hidden; border-radius: 999px; background: rgba(255,255,255,.12); border: 1px solid rgba(92,200,255,.22); margin: 10px 0 18px; }}
            .progress-fill {{ height: 100%; min-width: 8px; border-radius: inherit; background: linear-gradient(90deg, #5cc8ff, #75ffc8); box-shadow: 0 0 24px rgba(92,200,255,.45); }}
            .progress-indeterminate .progress-fill {{ width: 35%; animation: pulse 1.8s ease-in-out infinite alternate; }}
            @keyframes pulse {{ from {{ transform: translateX(-20%); opacity: .55; }} to {{ transform: translateX(190%); opacity: 1; }} }}
            dl {{ display: grid; grid-template-columns: 170px 1fr; gap: 10px 18px; margin: 0; color: #c6d8e8; }}
            dt {{ color: #8fb0c8; }}
            dd {{ margin: 0; overflow-wrap: anywhere; }}
            pre {{ overflow: auto; white-space: pre-wrap; color: #cfeeff; background: rgba(0,0,0,.35); border: 1px solid rgba(255,255,255,.1); border-radius: 14px; padding: 16px; max-height: 360px; font-size: 13px; line-height: 1.45; }}
            .field {{ display: grid; grid-template-columns: 240px 1fr; gap: 14px 18px; padding: 18px 0; border-top: 1px solid rgba(255,255,255,.1); }}
            .help {{ color: #a9bfd1; font-size: 14px; line-height: 1.45; margin-top: 8px; }}
            .warning {{ border-color: rgba(255,190,92,.36); background: rgba(255,190,92,.1); color: #ffe0a3; }}
            @media (max-width: 760px) {{ .connections, .field {{ grid-template-columns: 1fr; }} dl {{ grid-template-columns: 1fr; }} }}
        </style>
        <script>
          function copyValue(value, button) {{
            function done() {{ const old = button.textContent; button.textContent = '{escape(tr(lang, "copied"))}'; setTimeout(() => button.textContent = old, 1200); }}
            if (navigator.clipboard && window.isSecureContext) {{ navigator.clipboard.writeText(value).then(done); return; }}
            const area = document.createElement('textarea'); area.value = value; document.body.appendChild(area); area.select(); document.execCommand('copy'); document.body.removeChild(area); done();
          }}
          function confirmConfigSave(form) {{
            const oldHeight = form.dataset.currentStartHeight || '';
            const newHeight = (form.elements['START_HEIGHT'].value || '').trim();
            if (oldHeight !== newHeight) {{
              return confirm('{escape(tr(lang, "confirm_start_height"))}');
            }}
            return confirm('{escape(tr(lang, "confirm_restart"))}');
          }}
        </script>
        </head>
        <body><main>{body}</main></body></html>'''

        def status_body(lang, message=""):
            settings = read_settings()
            network = os.environ.get("APP_BITCOIN_NETWORK", "mainnet")
            lpath = log_path(network)
            status_key, detail_key = status_from_log(lpath)
            status = tr(lang, status_key)
            detail = tr(lang, detail_key)
            is_ready = status_key == "status_ready"
            port = os.environ.get("APP_FRIGATE_ELECTRUM_PORT", "50005")
            clearnet_host = os.environ.get("DEVICE_DOMAIN_NAME", "umbrel.local")
            onion_host = TOR_HOSTNAME_FILE.read_text().strip() if TOR_HOSTNAME_FILE.exists() else tr(lang, "onion_generating")
            onion_detail = tr(lang, "onion_ready") if onion_host.endswith(".onion") else tr(lang, "onion_waiting")
            restart_msg = f'<div class="card warning"><p>{escape(tr(lang, "restart_requested"))}</p></div>' if RESTART_FILE.exists() else ""
            msg = f'<div class="card warning"><p>{escape(message)}</p></div>' if message else restart_msg
            progress_label, progress_value, start_label, indexed_block, tip_block = progress_info(lpath, network, settings["START_HEIGHT"], is_ready, lang)
            progress_bar = f'<div class="progress"><div class="progress-fill" style="width: {escape(progress_value or "35")}%"></div></div>' if progress_value else '<div class="progress progress-indeterminate"><div class="progress-fill"></div></div>'
            return f'''
            <h1>Frigate</h1>
            <nav><a href="/">{escape(tr(lang, "status"))}</a><a href="/config">{escape(tr(lang, "configuration"))}</a></nav>
            {msg}
            <div class="status"><span class="dot"></span>{escape(status)}</div>
            <p>{escape(detail)}</p>
            <div class="card"><h2>{escape(tr(lang, "indexing_progress"))}</h2>{progress_bar}<dl><dt>{escape(tr(lang, "progress"))}</dt><dd><code>{escape(progress_label)}</code></dd><dt>{escape(tr(lang, "start_block"))}</dt><dd><code>{escape(start_label)}</code></dd><dt>{escape(tr(lang, "indexed_block"))}</dt><dd><code>{escape(indexed_block)}</code></dd><dt>{escape(tr(lang, "chain_tip"))}</dt><dd><code>{escape(tip_block)}</code></dd></dl></div>
            <div class="connections">
              <div class="connection"><h2>{escape(tr(lang, "clearnet"))}</h2><dl><dt>{escape(tr(lang, "host"))}</dt><dd><div class="copy-row"><code class="endpoint">{escape(clearnet_host)}</code><button class="copy-button" onclick="copyValue('{escape(clearnet_host)}', this)">{escape(tr(lang, "copy"))}</button></div></dd><dt>{escape(tr(lang, "port"))}</dt><dd><div class="copy-row"><code>{escape(port)}</code><button class="copy-button" onclick="copyValue('{escape(port)}', this)">{escape(tr(lang, "copy"))}</button></div></dd></dl><p>{escape(tr(lang, "clearnet_help"))}</p></div>
              <div class="connection"><h2>{escape(tr(lang, "tor_service"))}</h2><dl><dt>{escape(tr(lang, "host"))}</dt><dd><div class="copy-row"><code class="endpoint">{escape(onion_host)}</code><button class="copy-button" onclick="copyValue('{escape(onion_host)}', this)">{escape(tr(lang, "copy"))}</button></div></dd><dt>{escape(tr(lang, "port"))}</dt><dd><div class="copy-row"><code>{escape(port)}</code><button class="copy-button" onclick="copyValue('{escape(port)}', this)">{escape(tr(lang, "copy"))}</button></div></dd></dl><p>{escape(onion_detail)}</p></div>
            </div>
            <div class="card"><dl><dt>{escape(tr(lang, "bitcoin_network"))}</dt><dd><code>{escape(network)}</code></dd><dt>{escape(tr(lang, "configured_start_block"))}</dt><dd><code>{escape(settings["START_HEIGHT"] or tr(lang, "default_suffix"))}</code></dd><dt>{escape(tr(lang, "cache_size"))}</dt><dd><code>{escape(settings["CACHE_SIZE"])}</code></dd><dt>{escape(tr(lang, "compute_backend"))}</dt><dd><code>{escape(settings["COMPUTE_BACKEND"])}</code></dd><dt>{escape(tr(lang, "log_file"))}</dt><dd><code>{escape(str(lpath))}</code></dd><dt>{escape(tr(lang, "updated"))}</dt><dd>{escape(time.strftime("%Y-%m-%d %H:%M:%S UTC", time.gmtime()))}</dd></dl></div>
            <div class="card"><p>{escape(tr(lang, "latest_logs"))}</p><pre>{escape(latest_lines(lpath, lang))}</pre></div>
            '''

        def config_body(lang, message=""):
            settings = read_settings()
            msg = f'<div class="card warning"><p>{escape(message)}</p></div>' if message else ""
            fields = []
            for key in FIELDS:
                label = tr(lang, f"field_{key}_label")
                help_text = tr(lang, f"field_{key}_help")
                value = settings.get(key, DEFAULTS[key])
                if key == "COMPUTE_BACKEND":
                    control = '<select name="COMPUTE_BACKEND">' + ''.join(f'<option value="{v}" {"selected" if value == v else ""}>{v}</option>' for v in ["AUTO", "GPU", "CPU"]) + '</select>'
                else:
                    placeholder = tr(lang, "default_suffix") if key == 'START_HEIGHT' else DEFAULTS[key]
                    control = f'<input name="{key}" value="{escape(value)}" placeholder="{escape(placeholder)}">'
                warning = f'<p class="help"><strong>{escape(tr(lang, "important"))}</strong> {escape(tr(lang, "start_height_warning"))}</p>' if key == "START_HEIGHT" else ""
                fields.append(f'<div class="field"><div><h2>{escape(label)}</h2><p class="help"><code>{escape(key)}</code></p></div><div>{control}<p class="help">{escape(help_text)}</p>{warning}</div></div>')
            return f'''
            <h1>{escape(tr(lang, "configuration"))}</h1>
            <nav><a href="/">{escape(tr(lang, "status"))}</a><a href="/config">{escape(tr(lang, "configuration"))}</a></nav>
            {msg}
            <div class="card warning"><p>{escape(tr(lang, "config_notice"))}</p></div>
            <form method="post" action="/config" class="card" data-current-start-height="{escape(settings['START_HEIGHT'])}" onsubmit="return confirmConfigSave(this)">
              {''.join(fields)}
              <p><button type="submit">{escape(tr(lang, "save_configuration"))}</button></p>
            </form>
            '''

        class Handler(BaseHTTPRequestHandler):
            def language(self):
                return select_language(self.headers.get("Accept-Language", ""))

            def do_GET(self):
                lang = self.language()
                if self.path.startswith("/config"):
                    self.respond(page(tr(lang, "title_config"), config_body(lang), lang, refresh=False))
                else:
                    self.respond(page(tr(lang, "title_status"), status_body(lang), lang, refresh=True))

            def do_POST(self):
                if not self.path.startswith("/config"):
                    self.send_error(404)
                    return
                lang = self.language()
                length = int(self.headers.get("content-length", "0"))
                form = parse_qs(self.rfile.read(length).decode())
                old = read_settings()
                new = DEFAULTS.copy()
                for key in DEFAULTS:
                    new[key] = form.get(key, [old.get(key, DEFAULTS[key])])[0].strip()
                if new["COMPUTE_BACKEND"] not in ("AUTO", "GPU", "CPU"):
                    new["COMPUTE_BACKEND"] = "AUTO"
                write_settings(new)
                RESTART_FILE.write_text(str(int(time.time())) + "\n")
                if new["START_HEIGHT"] != old["START_HEIGHT"]:
                    message = tr(lang, "saved_start_height")
                else:
                    message = tr(lang, "saved_restart")
                self.respond(page(tr(lang, "title_config"), config_body(lang, message), lang, refresh=False))

            def respond(self, html):
                data = html.encode()
                self.send_response(200)
                self.send_header("content-type", "text/html; charset=utf-8")
                self.send_header("content-length", str(len(data)))
                self.end_headers()
                self.wfile.write(data)

            def log_message(self, *_):
                return

        ensure_settings()
        ThreadingHTTPServer(("0.0.0.0", 80), Handler).serve_forever()
    volumes:
      - ${APP_DATA_DIR}/data/frigate:/data/frigate
      - ${TOR_DATA_DIR}:/tor-data:ro
    environment:
      APP_BITCOIN_NETWORK: "${APP_BITCOIN_NETWORK}"
      APP_FRIGATE_ELECTRUM_PORT: "${APP_FRIGATE_ELECTRUM_PORT}"
      DEVICE_DOMAIN_NAME: "${DEVICE_DOMAIN_NAME}"
    networks:
      default:
        ipv4_address: $APP_FRIGATE_WEB_IP

  frigate:
    image: debian:bookworm-slim
    restart: always
    stop_grace_period: 2m
    command: |
      sh -c '
      set -eu
      FRIGATE_VERSION="$${FRIGATE_VERSION:-1.5.2}"
      runtime_dir="/data/frigate/runtime"
      settings_file="/data/frigate/settings.env"
      mkdir -p /data/frigate
      if [ ! -f "$${settings_file}" ]; then
        {
          printf "%s\n" "START_HEIGHT="
          printf "%s\n" "CACHE_SIZE=10M"
          printf "%s\n" "COMPUTE_BACKEND=AUTO"
          printf "%s\n" "DB_THREADS="
          printf "%s\n" "MEMORY_LIMIT="
          printf "%s\n" "BATCH_SIZE="
          printf "%s\n" "MAX_LABELS=10"
          printf "%s\n" "MAX_SUBSCRIPTIONS=100"
          printf "%s\n" "RPC_REQUEST_TIMEOUT_SECONDS=60"
          printf "%s\n" "RPC_BATCH_SIZE=100"
        } > "$${settings_file}"
      fi
      . "$${settings_file}"
      apt-get update
      DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends ca-certificates curl tar
      rm -rf /var/lib/apt/lists/*
      arch="$$(dpkg --print-architecture)"
      case "$${arch}" in
        amd64) frigate_arch="x86_64"; frigate_sha256="4e0f9b0ba90d07354859b7fa29f14deb5c01bd1b4c3449e657e7c0b4dddf667d" ;;
        arm64) frigate_arch="aarch64"; frigate_sha256="dc7aa026f78f0365d08d04358562a19d961bd7cbdfd862f2ec4a0fb5f3fe0413" ;;
        *) echo "Unsupported architecture: $${arch}" >&2; exit 1 ;;
      esac
      install_dir="$${runtime_dir}/frigate-$${FRIGATE_VERSION}-$${frigate_arch}"
      if [ ! -x "$${install_dir}/bin/frigate" ]; then
        tmp_file="/tmp/frigate.tar.gz"
        rm -rf "$${install_dir}"
        mkdir -p "$${install_dir}"
        curl -fsSL -o "$${tmp_file}" "https://github.com/sparrowwallet/frigate/releases/download/$${FRIGATE_VERSION}/frigate-$${FRIGATE_VERSION}-$${frigate_arch}.tar.gz"
        echo "$${frigate_sha256}  $${tmp_file}" | sha256sum -c -
        tar -xzf "$${tmp_file}" -C "$${install_dir}" --strip-components=1
        rm -f "$${tmp_file}"
      fi
      while true; do
        . "$${settings_file}"
        network="$${APP_BITCOIN_NETWORK:-mainnet}"
        home_dir="/data/frigate"
        config_dir="$${home_dir}"
        network_args=""
        if [ "$${network}" != "mainnet" ]; then
          config_dir="$${home_dir}/$${network}"
          network_args="-n $${network}"
        fi
        mkdir -p "$${config_dir}"
        desired_start_height="$${START_HEIGHT:-}"
        start_height_marker="$${config_dir}/.umbrel-start-height"
        marker_value="$${desired_start_height:-default}"
        if [ "$$(cat "$${start_height_marker}" 2>/dev/null || true)" != "$${marker_value}" ]; then
          rm -rf "$${config_dir}/db"
          printf "%s" "$${marker_value}" > "$${start_height_marker}"
        fi
        {
          printf "%s\n" "[core]"
          printf "%s\n" "connect = true"
          printf "%s\n" "server = \"http://$${APP_BITCOIN_NODE_IP}:$${APP_BITCOIN_RPC_PORT}\""
          printf "%s\n" "authType = \"USERPASS\""
          printf "%s\n" "auth = \"$${APP_BITCOIN_RPC_USER}:$${APP_BITCOIN_RPC_PASS}\""
          printf "%s\n" "zmqSequenceEndpoint = \"tcp://$${APP_BITCOIN_NODE_IP}:$${APP_BITCOIN_ZMQ_SEQUENCE_PORT}\""
          printf "%s\n" "rpcRequestTimeoutSeconds = $${RPC_REQUEST_TIMEOUT_SECONDS:-60}"
          printf "%s\n" "rpcBatchSize = $${RPC_BATCH_SIZE:-100}"
          printf "%s\n" ""
          printf "%s\n" "[index]"
          if [ -n "$${desired_start_height}" ]; then printf "%s\n" "startHeight = $${desired_start_height}"; fi
          printf "%s\n" "cacheSize = \"$${CACHE_SIZE:-10M}\""
          printf "%s\n" ""
          printf "%s\n" "[scan]"
          printf "%s\n" "computeBackend = \"$${COMPUTE_BACKEND:-AUTO}\""
          printf "%s\n" "maxLabels = $${MAX_LABELS:-10}"
          printf "%s\n" "maxSubscriptions = $${MAX_SUBSCRIPTIONS:-100}"
        } > "$${config_dir}/config.toml"
        if [ -n "$${DB_THREADS:-}" ]; then printf "dbThreads = %s\n" "$${DB_THREADS}" >> "$${config_dir}/config.toml"; fi
        if [ -n "$${MEMORY_LIMIT:-}" ]; then printf "memoryLimit = \"%s\"\n" "$${MEMORY_LIMIT}" >> "$${config_dir}/config.toml"; fi
        if [ -n "$${BATCH_SIZE:-}" ]; then printf "batchSize = %s\n" "$${BATCH_SIZE}" >> "$${config_dir}/config.toml"; fi
        {
          printf "%s\n" ""
          printf "%s\n" "[server]"
          printf "%s\n" "tcp = \"tcp://0.0.0.0:$${APP_FRIGATE_ELECTRUM_PORT}\""
          printf "%s\n" "backendElectrumServer = \"tcp://$${APP_ELECTRS_NODE_IP}:$${APP_ELECTRS_NODE_PORT}\""
        } >> "$${config_dir}/config.toml"
        rm -f "$${config_dir}/frigate.log"
        "$${install_dir}/bin/frigate" -d "$${home_dir}" $${network_args} &
        frigate_pid="$$!"
        restart_requested="0"
        while kill -0 "$${frigate_pid}" 2>/dev/null; do
          if [ -f "$${home_dir}/.restart-requested" ]; then
            restart_requested="1"
            rm -f "$${home_dir}/.restart-requested"
            kill "$${frigate_pid}" 2>/dev/null || true
            wait "$${frigate_pid}" 2>/dev/null || true
            break
          fi
          sleep 2
        done
        if [ "$${restart_requested}" = "1" ]; then
          continue
        fi
        wait "$${frigate_pid}"
        exit "$${?}"
      done
      '
    volumes:
      - ${APP_DATA_DIR}/data/frigate:/data/frigate
    environment:
      APP_VERSION: "${APP_VERSION}"
      FRIGATE_VERSION: "1.5.2"
      APP_BITCOIN_NETWORK: "${APP_BITCOIN_NETWORK}"
      APP_BITCOIN_NODE_IP: "${APP_BITCOIN_NODE_IP}"
      APP_BITCOIN_RPC_PORT: "${APP_BITCOIN_RPC_PORT}"
      APP_BITCOIN_RPC_USER: "${APP_BITCOIN_RPC_USER}"
      APP_BITCOIN_RPC_PASS: "${APP_BITCOIN_RPC_PASS}"
      APP_BITCOIN_ZMQ_SEQUENCE_PORT: "${APP_BITCOIN_ZMQ_SEQUENCE_PORT}"
      APP_ELECTRS_NODE_IP: "${APP_ELECTRS_NODE_IP}"
      APP_ELECTRS_NODE_PORT: "${APP_ELECTRS_NODE_PORT}"
      APP_FRIGATE_ELECTRUM_PORT: "${APP_FRIGATE_ELECTRUM_PORT}"

  electrum_proxy:
    image: python:3.12-alpine
    restart: on-failure
    depends_on:
      - frigate
    command:
      - python
      - -c
      - |
        import asyncio
        import json
        import os

        BANNER = os.environ.get("FRIGATE_ELECTRUM_BANNER", "  _____      _             _        _   _           _              _\n |  ___| __ (_) __ _  __ _| |_ ___ | | | |_ __ ___ | |__  _ __ ___| |\n | |_ | '_ \\| |/ _` |/ _` | __/ _ \\| | | | '_ ` _ \\| '_ \\| '__/ _ \\ |\n |  _|| | | | | (_| | (_| | ||  __/| |_| | | | | | | |_) | | |  __/ |\n |_|  |_| |_|_|\\__, |\\__,_|\\__\\___| \\___/|_| |_| |_|_.__/|_|  \\___|_|\n                |___/\nLaboratorio Albercoin\nSemilla Bitcoin")
        LISTEN_PORT = int(os.environ.get("APP_FRIGATE_ELECTRUM_PORT", "50005"))
        UPSTREAM_HOST = os.environ.get("FRIGATE_UPSTREAM_HOST", "frigate")
        UPSTREAM_PORT = int(os.environ.get("FRIGATE_UPSTREAM_PORT", "50005"))

        def banner_response(request):
            return {"jsonrpc": request.get("jsonrpc", "2.0"), "id": request.get("id"), "result": BANNER}

        async def forward(reader, writer, raw):
            writer.write(raw + b"\n")
            await writer.drain()
            response = await reader.readline()
            return response.rstrip(b"\r\n")

        async def handle(client_reader, client_writer):
            upstream_reader = None
            upstream_writer = None
            try:
                while True:
                    raw = await client_reader.readline()
                    if not raw:
                        break
                    stripped = raw.strip()
                    try:
                        request = json.loads(stripped)
                        if isinstance(request, dict) and request.get("method") == "server.banner":
                            response = json.dumps(banner_response(request), separators=(",", ":")).encode()
                        else:
                            if upstream_writer is None or upstream_writer.is_closing():
                                upstream_reader, upstream_writer = await asyncio.open_connection(UPSTREAM_HOST, UPSTREAM_PORT)
                            response = await forward(upstream_reader, upstream_writer, stripped)
                    except Exception:
                        if upstream_writer is None or upstream_writer.is_closing():
                            upstream_reader, upstream_writer = await asyncio.open_connection(UPSTREAM_HOST, UPSTREAM_PORT)
                        response = await forward(upstream_reader, upstream_writer, stripped)
                    client_writer.write(response + b"\n")
                    await client_writer.drain()
            finally:
                if upstream_writer is not None:
                    upstream_writer.close()
                    await upstream_writer.wait_closed()
                client_writer.close()
                await client_writer.wait_closed()

        async def main():
            server = await asyncio.start_server(handle, "0.0.0.0", LISTEN_PORT)
            async with server:
                await server.serve_forever()

        asyncio.run(main())
    environment:
      APP_FRIGATE_ELECTRUM_PORT: "${APP_FRIGATE_ELECTRUM_PORT}"
      FRIGATE_ELECTRUM_BANNER: |-
        _____      _             _        _   _           _              _
        |  ___| __ (_) __ _  __ _| |_ ___ | | | |_ __ ___ | |__  _ __ ___| |
        | |_ | '_ \| |/ _` |/ _` | __/ _ \| | | | '_ ` _ \| '_ \| '__/ _ \ |
        |  _|| | | | | (_| | (_| | ||  __/| |_| | | | | | | |_) | | |  __/ |
        |_|  |_| |_|_|\__, |\__,_|\__\___| \___/|_| |_| |_|_.__/|_|  \___|_|
                      |___/
        Laboratorio Albercoin
        Semilla Bitcoin
    ports:
      - "${APP_FRIGATE_ELECTRUM_PORT}:${APP_FRIGATE_ELECTRUM_PORT}"
    networks:
      default:
        ipv4_address: $APP_FRIGATE_IP

  tor:
    image: getumbrel/tor:0.4.7.8@sha256:2ace83f22501f58857fa9b403009f595137fa2e7986c4fda79d82a8119072b6a
    user: "1000:1000"
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/torrc:/etc/tor/torrc:ro
      - ${TOR_DATA_DIR}:/data
    environment:
      HOME: "/tmp"
    networks:
      default:
        ipv4_address: $APP_FRIGATE_TOR_IP
