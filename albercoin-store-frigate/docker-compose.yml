version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: albercoin-store-frigate_web_1
      APP_PORT: 8080

  web:
    image: node:20-alpine
    restart: on-failure
    depends_on:
      init:
        condition: service_completed_successfully
    working_dir: /app
    volumes:
      - ./web:/app:ro
      - ${APP_DATA_DIR}/icon.png:/usr/share/nginx/html/icon.png:ro
      - ${APP_DATA_DIR}/data/frigate.log:/usr/share/nginx/html/frigate.log:ro
      - ${APP_DATA_DIR}/data:/data
    environment:
      FRIGATE_TOR_ADDRESS: "${APP_FRIGATE_RPC_HIDDEN_SERVICE}"
      FRIGATE_VERSION: "${APP_VERSION}"
    command: ["node", "server.js"]

  init:
    image: alpine:3.20
    user: "0:0"
    restart: "no"
    volumes:
      - ${APP_DATA_DIR}/data:/data
    command: ["sh", "-c", "mkdir -p /data && touch /data/frigate.log && if [ ! -f /data/frigate-settings.env ]; then printf 'FRIGATE_COMPUTE_BACKEND=CPU\nFRIGATE_BATCH_SIZE=300000\nFRIGATE_DB_THREADS=4\nFRIGATE_MEMORY_LIMIT=8GB\nFRIGATE_CACHE_SIZE=10M\nFRIGATE_RPC_TIMEOUT=60\nFRIGATE_RPC_BATCH_SIZE=100\nFRIGATE_MAX_LABELS=10\nFRIGATE_MAX_SUBSCRIPTIONS=100\nFRIGATE_START_HEIGHT=\n' > /data/frigate-settings.env; fi && chmod 644 /data/frigate.log /data/frigate-settings.env && chown -R 1000:1000 /data && chmod 755 /data"]

  server:
    image: ghcr.io/4rkad/frigate-umbrel:1.5.2-5@sha256:122338455a8ccb367b199e033ab135fbf3280913ddd66cae8357b7de8ac9f3bf
    user: "0:0"
    restart: on-failure
    stop_grace_period: 1m
    depends_on:
      init:
        condition: service_completed_successfully
    ports:
      - "57001:57001"
    volumes:
      - ${APP_DATA_DIR}/data:/data
      - ${APP_BITCOIN_DATA_DIR}:/data/.bitcoin:ro
      - ./scripts/frigate-entrypoint.sh:/usr/local/bin/frigate-entrypoint.sh:ro
    environment:
      APP_BITCOIN_NODE_IP: ${APP_BITCOIN_NODE_IP}
      APP_BITCOIN_RPC_PORT: ${APP_BITCOIN_RPC_PORT}
      APP_BITCOIN_ZMQ_SEQUENCE_PORT: ${APP_BITCOIN_ZMQ_SEQUENCE_PORT}
      FRIGATE_BITCOIN_DATA_DIR: "/data/.bitcoin"
      FRIGATE_BACKEND_ELECTRUM: "tcp://${APP_ELECTRS_NODE_IP}:${APP_ELECTRS_NODE_PORT}"
      FRIGATE_NETWORK: ${APP_BITCOIN_NETWORK:-mainnet}
      FRIGATE_COMPUTE_BACKEND: "CPU"
      FRIGATE_PORT: "57001"
    entrypoint: ["/bin/sh", "/usr/local/bin/frigate-entrypoint.sh"]

  tor:
    image: getumbrel/tor:0.4.7.8@sha256:2ace83f22501f58857fa9b403009f595137fa2e7986c4fda79d82a8119072b6a
    user: "1000:1000"
    restart: on-failure
    volumes:
      - ${TOR_DATA_DIR}:/data
    environment:
      HOME: "/tmp"
    entrypoint: ["/bin/sh", "-c"]
    command: ["mkdir -p /data/app-albercoin-store-frigate/main && chmod 700 /data/app-albercoin-store-frigate/main && printf 'HiddenServiceDir /data/app-albercoin-store-frigate/main\\nHiddenServicePort 57001 albercoin-store-frigate_server_1:57001\\n' > /tmp/torrc && exec tor -f /tmp/torrc"]
