version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: $APP_FRIGATE_WEB_IP
      APP_PORT: 80

  web:
    image: python:3.12-alpine
    restart: on-failure
    command:
      - python
      - -c
      - |
        from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer
        from html import escape
        from pathlib import Path
        from urllib.parse import parse_qs
        import os
        import re
        import time

        DATA_DIR = Path("/data/frigate")
        SETTINGS_FILE = DATA_DIR / "settings.env"
        RESTART_FILE = DATA_DIR / ".restart-requested"
        TOR_HOSTNAME_FILE = Path("/tor-data/app-albercoin-store-frigate-electrum/hostname")

        DEFAULTS = {
            "START_HEIGHT": "",
            "CACHE_SIZE": "10M",
            "COMPUTE_BACKEND": "AUTO",
            "DB_THREADS": "",
            "MEMORY_LIMIT": "",
            "BATCH_SIZE": "",
            "MAX_LABELS": "10",
            "MAX_SUBSCRIPTIONS": "100",
            "RPC_REQUEST_TIMEOUT_SECONDS": "60",
            "RPC_BATCH_SIZE": "100",
        }

        FIELDS = ["START_HEIGHT", "CACHE_SIZE", "COMPUTE_BACKEND", "DB_THREADS", "MEMORY_LIMIT", "BATCH_SIZE", "MAX_LABELS", "MAX_SUBSCRIPTIONS", "RPC_REQUEST_TIMEOUT_SECONDS", "RPC_BATCH_SIZE"]

