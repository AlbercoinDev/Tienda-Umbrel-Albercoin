<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Frigate on Umbrel</title>
  <style>
    body { margin: 0; min-height: 100vh; background: #0b1020; color: #eaf6ff; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; display: grid; place-items: center; }
    main { width: min(760px, calc(100% - 40px)); padding: 42px; border-radius: 28px; background: linear-gradient(145deg, rgba(255,255,255,.12), rgba(255,255,255,.04)); box-shadow: 0 24px 80px rgba(0,0,0,.35); }
    h1 { margin: 0 0 12px; font-size: clamp(34px, 7vw, 64px); line-height: 1; }
    p { color: #c6d8e8; font-size: 18px; line-height: 1.6; }
    code { background: rgba(92,200,255,.14); border: 1px solid rgba(92,200,255,.32); color: #9ee3ff; padding: 3px 8px; border-radius: 8px; }
    .card { margin-top: 26px; padding: 22px; border-radius: 18px; background: rgba(0,0,0,.22); }
  </style>
</head>
<body>
  <main>
    <h1>Frigate</h1>
    <p>Frigate is running as an Electrum server extension for Bitcoin Silent Payments (BIP352).</p>
    <div class="card">
      <p>Connect compatible wallets to your Umbrel host on TCP port <code>50005</code>.</p>
      <p>Frigate uses your Bitcoin Core app for RPC/ZMQ and your Electrs app as the backend for regular Electrum requests.</p>
    </div>
  </main>
</body>
</html>
