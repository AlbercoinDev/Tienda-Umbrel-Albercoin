                "indexing_progress": "Progreso de indexación", "progress": "Progreso", "start_block": "Bloque inicial", "indexed_block": "Bloque indexado", "chain_tip": "Punta de cadena",
                "clearnet": "Clearnet / LAN", "host": "Host", "port": "Puerto", "clearnet_help": "Usa esto desde wallets en tu red local.", "tor_service": "Servicio oculto Tor",
                "bitcoin_network": "Red Bitcoin", "configured_start_block": "Bloque inicial configurado", "cache_size": "Tamaño de caché", "compute_backend": "Backend de cálculo", "log_file": "Archivo de log", "updated": "Actualizado", "latest_logs": "Últimas líneas del log de Frigate:",
