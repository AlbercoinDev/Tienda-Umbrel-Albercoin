<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Frigate</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <img src="/icon.png" alt="">
          <div>
            <h1>Frigate</h1>
            <p id="version">Servidor Electrum para Silent Payments</p>
          </div>
        </div>
        <div class="status" id="status">Cargando</div>
      </header>

      <section class="hero">
        <div>
          <h2>Ajustes de rendimiento</h2>
          <p>Guarda una configuración adaptada a la CPU, memoria y GPU de esta máquina. Los cambios se aplican al reiniciar la app desde Umbrel.</p>
        </div>
        <div class="endpoint">
          <span>Puerto TCP</span>
          <strong>57001</strong>
        </div>
      </section>

      <nav class="tabs" aria-label="Secciones">
        <button class="tab active" data-tab="settings">Configuración</button>
        <button class="tab" data-tab="profiles">Perfiles</button>
        <button class="tab" data-tab="logs">Registro</button>
      </nav>

      <section id="settings" class="panel active">
        <form id="settingsForm" class="settings-grid">
          <label>
            <span>Motor de cálculo</span>
            <select name="FRIGATE_COMPUTE_BACKEND">
              <option value="AUTO">Auto</option>
              <option value="CPU">CPU</option>
              <option value="GPU">GPU</option>
            </select>
          </label>
          <label>
            <span>Tamaño de lote</span>
            <input name="FRIGATE_BATCH_SIZE" type="number" min="10000" max="1000000" step="10000">
          </label>
          <label>
            <span>Hilos de base de datos</span>
            <input name="FRIGATE_DB_THREADS" type="number" min="1" max="64" step="1">
          </label>
          <label>
            <span>Límite de memoria</span>
            <input name="FRIGATE_MEMORY_LIMIT" pattern="^[0-9]+(K|M|G|KB|MB|GB)$">
          </label>
          <label>
            <span>Caché de índice</span>
            <input name="FRIGATE_CACHE_SIZE" pattern="^[0-9]+(K|M|G|KB|MB|GB)$">
          </label>
          <label>
            <span>Timeout RPC</span>
            <input name="FRIGATE_RPC_TIMEOUT" type="number" min="5" max="600" step="1">
          </label>
          <label>
            <span>Lote RPC</span>
            <input name="FRIGATE_RPC_BATCH_SIZE" type="number" min="1" max="1000" step="1">
          </label>
          <label>
            <span>Máximo de etiquetas</span>
            <input name="FRIGATE_MAX_LABELS" type="number" min="1" max="1000" step="1">
          </label>
          <label>
            <span>Suscripciones por conexión</span>
            <input name="FRIGATE_MAX_SUBSCRIPTIONS" type="number" min="1" max="10000" step="1">
          </label>
          <label>
            <span>Altura inicial</span>
            <input name="FRIGATE_START_HEIGHT" type="number" min="0" max="10000000" step="1" placeholder="Automático">
          </label>
        </form>
        <div class="actions">
          <button type="button" id="saveButton">Guardar configuración</button>
          <span id="saveMessage"></span>
        </div>
      </section>

      <section id="profiles" class="panel">
        <div class="profile-grid">
          <button class="profile" data-profile="low">
            <strong>Equipo modesto</strong>
            <span>CPU, menor memoria y lotes pequeños.</span>
          </button>
          <button class="profile" data-profile="balanced">
            <strong>Equilibrado</strong>
            <span>Valores por defecto para la mayoría de Umbrel.</span>
          </button>
          <button class="profile" data-profile="fast">
            <strong>Hardware potente</strong>
            <span>Auto/GPU, más caché y lotes grandes.</span>
          </button>
        </div>
      </section>

      <section id="logs" class="panel">
        <pre id="logOutput">Cargando registro...</pre>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
